name: accounting
services:
  postgres:
    image: postgres:15.2
    ports:
      - '5432:5432'
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER"']
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - accounting-postgres:/var/lib/postgresql/data

volumes:
  accounting-postgres:
    external: true
